name: Books Agents

on:
  issues:
    types: [labeled]

jobs:
  run-agent:
    if: contains(fromJSON('["find-book", "encode-book", "books-status", "books-audit", "books-init"]'), github.event.label.name)
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install openai pyyaml

      - name: Run agent
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          AGENT_LABEL: ${{ github.event.label.name }}
        run: python runner/run.py

      - name: Commit knowledge updates
        if: contains(fromJSON('["encode-book", "books-init"]'), github.event.label.name)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/BOOKS/ .claude/books_checkpoint.json
          git diff --cached --quiet || git commit -m "chore: update BOOKS knowledge base [bot]"
          git push
